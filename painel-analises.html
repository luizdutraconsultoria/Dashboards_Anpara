<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise Comparativa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--s1:#0f1019;--s2:#15161f;--s3:#1c1d2a;
  --b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);
  --tx:#ecedf5;--mu:#55576e;--mu2:#8a8da8;
  --blue:#4f7aff;--green:#00c896;--amber:#f5a623;--red:#ff4f6a;--purple:#9d7dff;--cyan:#22d3ee;
  --font:'Plus Jakarta Sans',sans-serif;--r:10px;--r2:16px;
}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:14px;min-height:100vh;}
.wrap{max-width:1480px;margin:0 auto;padding:24px 28px;}

.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--b);}
.hdr-l{display:flex;align-items:center;gap:10px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--blue);box-shadow:0 0 12px rgba(79,122,255,.6);}
.hdr h1{font-size:18px;font-weight:800;letter-spacing:-.4px;}
.hdr-meta{font-size:11px;color:var(--mu2);margin-top:3px;font-weight:500;}
.hdr-r{display:flex;gap:8px;align-items:center;}
.live{display:flex;align-items:center;gap:5px;background:rgba(0,200,150,.08);border:1px solid rgba(0,200,150,.2);color:var(--green);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.btn{background:var(--s2);border:1px solid var(--b2);color:var(--mu2);padding:6px 14px;border-radius:var(--r);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--s3);color:var(--tx);}
.btn-primary{background:rgba(79,122,255,.12);border-color:rgba(79,122,255,.35);color:var(--blue);}
.btn-primary:hover{background:rgba(79,122,255,.2);color:var(--blue);}

.scuts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.sc{background:var(--s1);border:1px solid var(--b);color:var(--mu2);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);}
.sc:hover,.sc.on{background:rgba(79,122,255,.1);border-color:rgba(79,122,255,.3);color:var(--blue);}

.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;background:var(--s1);border:1px solid var(--b);border-radius:var(--r2);padding:12px 16px;align-items:flex-end;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);}
.fg input[type=date],.fg select{background:var(--s2);border:1px solid var(--b2);color:var(--tx);padding:7px 12px;border-radius:var(--r);font-family:var(--font);font-size:12px;font-weight:500;outline:none;transition:border-color .15s;color-scheme:dark;}
.fg input[type=date]{min-width:148px;}
.fg input:focus,.fg select:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(79,122,255,.1);}
.fsep{width:1px;background:var(--b);margin:0 4px;align-self:stretch;}

/* BARRA DE COMPARACAO */
.cmp-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;background:var(--s1);border:1px solid var(--b);border-radius:var(--r2);padding:14px 16px;align-items:flex-end;}
.cmp-period{display:flex;flex-direction:column;gap:6px;}
.cmp-period-row{display:flex;gap:8px;}
.cmp-period-lbl{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);}
.cmp-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.cmp-dot.a{background:var(--blue);}
.cmp-dot.b{background:var(--mu2);}
.cmp-actions{display:flex;align-items:flex-end;gap:8px;margin-left:auto;}

/* KPIs FINANCEIROS */
.kfi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
@media(max-width:900px){.kfi{grid-template-columns:repeat(2,1fr);}}
.kf{background:var(--s1);border:1px solid var(--b);border-radius:var(--r2);padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s;animation:fadeUp .35s ease both;}
.kf:hover{border-color:var(--b2);}
.kf-bar{position:absolute;top:0;left:0;right:0;height:2px;}
.kf-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--mu2);margin-bottom:10px;}
.kf-val{font-size:30px;font-weight:800;letter-spacing:-1.2px;line-height:1;margin-bottom:4px;}
.kf-sub{font-size:11px;color:var(--mu);font-weight:500;}
.kf-d{font-size:10px;font-weight:700;margin-top:6px;}
.kf-d.up{color:var(--green);}.kf-d.dn{color:var(--red);}
.kf-cmp .kf-row{display:flex;align-items:baseline;gap:6px;margin-bottom:2px;}
.kf-cmp .kf-row .kf-tag{font-size:10px;font-weight:700;color:var(--mu2);width:14px;}
.kf-cmp .kf-row .kf-val{font-size:22px;}
.kf-cmp .kf-row.b .kf-val{color:var(--mu2);font-size:16px;}

/* FUNIL */
.funil-wrap{margin-bottom:16px;animation:fadeUp .35s ease .05s both;}
.funil-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:10px;}
.funil-row{display:flex;align-items:stretch;}

.fe{flex:1;background:var(--s1);border:1px solid var(--b);padding:16px 14px;transition:border-color .2s;min-width:0;}
.fe:hover{border-color:var(--b2);}
.fe:not(:last-child){border-right:none;}
.fe-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mu2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fe-val{font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:4px;}
.fe-pct-total{font-size:11px;font-weight:600;color:var(--mu2);}

.fe-perda{width:130px;flex-shrink:0;background:var(--s1);border:1px solid var(--b);border-radius:0 var(--r2) var(--r2) 0;padding:16px 14px;border-left:2px solid rgba(255,79,106,.25);}
.fe-perda .fe-lbl{color:rgba(255,79,106,.6);}

.fe-bar-a,.fe-bar-b{height:3px;border-radius:2px;margin-top:8px;background:var(--s3);overflow:hidden;}
.fe-bar-b{margin-top:4px;}
.fe-bar-fill{height:100%;border-radius:2px;transition:width .8s ease;}
.fe-delta{font-size:10px;font-weight:700;margin-top:6px;}
.fe-delta.up{color:var(--green);}.fe-delta.dn{color:var(--red);}

/* CARDS */
.row{display:grid;gap:12px;margin-bottom:12px;}
.r2{grid-template-columns:1fr 1fr;}
@media(max-width:900px){.r2{grid-template-columns:1fr}}
.card{background:var(--s1);border:1px solid var(--b);border-radius:var(--r2);padding:20px;animation:fadeUp .35s ease both;}
.ct{font-size:13px;font-weight:700;letter-spacing:-.2px;margin-bottom:2px;}
.cs{font-size:11px;color:var(--mu2);margin-bottom:16px;font-weight:500;}

/* TOGGLE METRICA */
.toggle-grp{display:flex;gap:6px;flex-wrap:wrap;}
.tgl{background:var(--s2);border:1px solid var(--b);color:var(--mu2);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);}
.tgl:hover,.tgl.on{background:rgba(79,122,255,.1);border-color:rgba(79,122,255,.3);color:var(--blue);}

/* LEGENDA EVOLUCAO */
.evo-legend{display:flex;gap:16px;align-items:center;margin-bottom:10px;font-size:11px;color:var(--mu2);font-weight:600;flex-wrap:wrap;}
.evo-leg-item{display:flex;align-items:center;gap:6px;}
.evo-leg-line{width:18px;height:2px;background:#4f7aff;display:inline-block;border-radius:2px;}
.evo-leg-line.b{background:transparent;border-top:2px dashed rgba(255,255,255,.35);}

/* TABELA COMPARATIVA */
.cmp-table{width:100%;border-collapse:collapse;font-size:12px;}
.cmp-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--mu);text-align:right;padding:6px 8px;border-bottom:1px solid var(--b);white-space:nowrap;}
.cmp-table th:first-child,.cmp-table td:first-child{text-align:left;}
.cmp-table td{padding:7px 8px;border-bottom:1px solid var(--b);text-align:right;font-weight:600;white-space:nowrap;}
.cmp-table td:first-child{font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;}
.cmp-table tr:last-child td{border-bottom:none;}
.cmp-table .pos{color:var(--green);}
.cmp-table .neg{color:var(--red);}

/* MOTIVOS COMPARATIVO */
.dual-bar{display:flex;flex-direction:column;gap:10px;padding-top:2px;}
.db-row{display:flex;flex-direction:column;gap:3px;}
.db-lbl{font-size:11px;color:var(--mu2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.db-line{display:flex;align-items:center;gap:8px;}
.db-tag{font-size:9px;font-weight:700;color:var(--mu);width:12px;}
.db-bw{flex:1;height:5px;background:var(--s2);border-radius:2px;overflow:hidden;}
.db-fill{height:100%;border-radius:2px;}
.db-fill.a{background:var(--blue);}
.db-fill.b{background:var(--mu2);}
.db-n{font-size:11px;font-weight:700;width:30px;text-align:right;}

.estado{text-align:center;padding:60px 20px;}
.estado h3{font-size:16px;font-weight:600;margin-bottom:8px;color:var(--mu2);}
.estado p{font-size:12px;color:var(--mu);}
.spin{width:24px;height:24px;border:2px solid var(--b2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.footer{text-align:center;padding-top:20px;border-top:1px solid var(--b);font-size:11px;color:var(--mu);font-weight:500;margin-top:8px;}
</style>
</head>
<body>
<div class="wrap">

<header class="hdr">
  <div>
    <div class="hdr-l"><div class="dot"></div><h1>Análise Comparativa</h1></div>
    <div class="hdr-meta" id="hsub">carregando dados...</div>
  </div>
  <div class="hdr-r">
    <span class="live" id="pill" style="display:none"><span class="live-dot"></span>ao vivo</span>
    <a class="btn" href="dashboard-comercial.html" style="text-decoration:none">← Dashboard</a>
    <button class="btn" onclick="carregar()">↻ atualizar</button>
  </div>
</header>

<div class="scuts" id="scuts">
  <button class="sc on" data-sc="mes-atual"     onclick="sMesAtualVsAnterior()">Mês atual vs. anterior</button>
  <button class="sc"    data-sc="mes-completo"  onclick="sMesCompletoVsAnterior()">Mês completo vs. anterior</button>
  <button class="sc"    data-sc="ano"           onclick="sAnoVsAnterior()">Este ano vs. anterior</button>
</div>

<div class="cmp-bar">
  <div class="cmp-period">
    <div class="cmp-period-lbl"><span class="cmp-dot a"></span>Período A</div>
    <div class="cmp-period-row">
      <div class="fg"><label>De</label><input type="date" id="pa-de"/></div>
      <div class="fg"><label>Até</label><input type="date" id="pa-ate"/></div>
    </div>
  </div>
  <div class="fsep"></div>
  <div class="cmp-period">
    <div class="cmp-period-lbl"><span class="cmp-dot b"></span>Período B</div>
    <div class="cmp-period-row">
      <div class="fg"><label>De</label><input type="date" id="pb-de"/></div>
      <div class="fg"><label>Até</label><input type="date" id="pb-ate"/></div>
    </div>
  </div>
  <div class="cmp-actions">
    <button class="btn btn-primary" onclick="comparar()">Comparar</button>
  </div>
</div>

<div id="conteudo"><div class="estado"><div class="spin"></div><h3>Carregando...</h3><p>conectando ao Power CRM</p></div></div>
<div class="footer" id="footer"></div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbw4rX9x64xg4PWvW3Zw_g6rv3rggoqqOP9tRdmBCGW5fcorCt5A4Kkd71cypViYp3c6qw/exec';
const CI={dtLead:0,dtNeg:1,dtLibVist:2,dtVistoria:3,dtVenda:4,dtPerda:5,isPerda:6,receita:7,vendedor:8,plano:9,origem:10,motivoPerda:11,unidade:12};

const ETAPAS=[
  {key:'dtLead',    lbl:'Cotações recebidas',     cor:'#4f7aff'},
  {key:'dtNeg',     lbl:'Em negociação',           cor:'#f5a623'},
  {key:'dtLibVist', lbl:'Liberadas p/ vistoria',  cor:'#9d7dff'},
  {key:'dtVistoria',lbl:'Vistoria finalizada',     cor:'#22d3ee'},
  {key:'dtVenda',   lbl:'Vendas concretizadas',    cor:'#00c896'},
];

let DRAW=null,_evoMetric='leads',_cacheA=null,_cacheB=null,_chartEvo=null;

/* ===== Helpers (iguais ao dashboard-comercial.html) ===== */
function norm(v,fb){return v&&v.trim()?v.trim():fb;}
function fmt(n){n=+n;if(isNaN(n))return'—';return n>=1000?(n/1000).toFixed(1).replace('.',',')+'k':n.toLocaleString('pt-BR');}
function fmtR(n){n=+n;if(!n||isNaN(n))return'R$ 0';if(n>=1e6)return'R$ '+(n/1e6).toFixed(1).replace('.',',')+'M';if(n>=1000)return'R$ '+(n/1000).toFixed(1).replace('.',',')+'k';return'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fK(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(0)+'k';return n;}
function fmtM(s){if(!s)return'';const[y,m]=s.split('-');return['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][+m-1]+'/'+y.slice(2);}
function fD(d){return d.toISOString().slice(0,10);}
function fBR(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;}
function vRec(r){return parseFloat(String(r[CI.receita]||'0').replace('R$','').replace(/\./g,'').replace(',','.'))||0;}

/* ===== Carregamento ===== */
async function carregar(){
  document.getElementById('conteudo').innerHTML='<div class="estado"><div class="spin"></div><h3>Carregando...</h3><p>conectando ao Power CRM</p></div>';
  try{
    const r=await fetch(API+'?acao=raw&t='+Date.now());
    const d=await r.json();
    if(d.erro) throw new Error(d.erro);
    DRAW=d.dados||[];
    document.getElementById('hsub').textContent=fmt(DRAW.length)+' registros carregados';
    document.getElementById('pill').style.display='flex';
    sMesAtualVsAnterior();
  }catch(e){
    document.getElementById('conteudo').innerHTML=`<div class="estado"><h3>Erro</h3><p>${e.message}</p></div>`;
  }
}

/* ===== Atalhos de período ===== */
function lastDayOfMonth(y,m){return new Date(y,m+1,0).getDate();}
function setPeriodos(aDe,aAte,bDe,bAte){
  document.getElementById('pa-de').value=aDe;
  document.getElementById('pa-ate').value=aAte;
  document.getElementById('pb-de').value=bDe;
  document.getElementById('pb-ate').value=bAte;
}
function mAti(tag){document.querySelectorAll('.sc').forEach(b=>b.classList.toggle('on',b.dataset.sc===tag));}

/* Mês atual (dia 01 até hoje) vs. mesmo intervalo do mês anterior */
function sMesAtualVsAnterior(){
  const h=new Date();
  const y=h.getFullYear(),m=h.getMonth(),dia=h.getDate();
  const aDe=new Date(y,m,1), aAte=h;
  const pm=m===0?11:m-1, py=m===0?y-1:y;
  const bDe=new Date(py,pm,1);
  const bAte=new Date(py,pm,Math.min(dia,lastDayOfMonth(py,pm)));
  setPeriodos(fD(aDe),fD(aAte),fD(bDe),fD(bAte));
  mAti('mes-atual');
  comparar();
}

/* Mês corrente completo vs. mês anterior completo */
function sMesCompletoVsAnterior(){
  const h=new Date();
  const y=h.getFullYear(),m=h.getMonth();
  const aDe=new Date(y,m,1), aAte=new Date(y,m,lastDayOfMonth(y,m));
  const pm=m===0?11:m-1, py=m===0?y-1:y;
  const bDe=new Date(py,pm,1), bAte=new Date(py,pm,lastDayOfMonth(py,pm));
  setPeriodos(fD(aDe),fD(aAte),fD(bDe),fD(bAte));
  mAti('mes-completo');
  comparar();
}

/* jan-hoje deste ano vs. mesmo intervalo do ano anterior */
function sAnoVsAnterior(){
  const h=new Date();
  const y=h.getFullYear(),py=y-1;
  const aDe=new Date(y,0,1), aAte=h;
  let bDia=h.getDate(),bMes=h.getMonth();
  if(bMes===1&&bDia===29&&lastDayOfMonth(py,1)===28) bDia=28; // 29/fev sem correspondente
  const bDe=new Date(py,0,1), bAte=new Date(py,bMes,bDia);
  setPeriodos(fD(aDe),fD(aAte),fD(bDe),fD(bAte));
  mAti('ano');
  comparar();
}

/* ===== Agregação de um período ===== */
function computarPeriodo(dados,de,ate){
  const inP=dt=>{
    if(!dt||dt==='') return false;
    if(de&&dt<de) return false;
    if(ate&&dt>ate) return false;
    return true;
  };
  const dtPerdaEfetiva=r=>{
    const dp=r[CI.dtPerda];
    if(dp&&dp!=='') return dp;
    return r[CI.dtLead]||'';
  };

  const tL    = dados.filter(r=>inP(r[CI.dtLead])).length;
  const tNeg  = dados.filter(r=>inP(r[CI.dtNeg])).length;
  const tLibV = dados.filter(r=>inP(r[CI.dtLibVist])).length;
  const tVist = dados.filter(r=>inP(r[CI.dtVistoria])).length;
  const tVend = dados.filter(r=>inP(r[CI.dtVenda])).length;
  const tPerd = dados.filter(r=>r[CI.isPerda]===1&&inP(dtPerdaEfetiva(r))).length;

  const tR=dados.filter(r=>inP(r[CI.dtVenda])).reduce((s,r)=>s+vRec(r),0);
  const conv=tL>0?(tVend/tL*100):0;
  const vols=[tL,tNeg,tLibV,tVist,tVend];

  /* Por vendedor */
  const vMap={};
  const ensureV=v=>(vMap[v]=vMap[v]||{vendedor:v,leads:0,vendas:0,receita:0});
  dados.forEach(r=>{
    const v=norm(r[CI.vendedor],'Sem vendedor');
    if(inP(r[CI.dtLead]))  ensureV(v).leads++;
    if(inP(r[CI.dtVenda])){const o=ensureV(v);o.vendas++;o.receita+=vRec(r);}
  });
  const vendedores=Object.values(vMap).map(v=>({...v,conversao:v.leads>0?(v.vendas/v.leads*100):0}));

  /* Motivos de perda */
  const motivos={};
  dados.filter(r=>r[CI.isPerda]===1&&inP(dtPerdaEfetiva(r))).forEach(r=>{
    const m=r[CI.motivoPerda]||'Sem motivo';
    motivos[m]=(motivos[m]||0)+1;
  });

  /* Evolução diária (Dia 1..N) */
  const daily=[];
  if(de&&ate){
    for(let d=new Date(de+'T00:00:00'),fim=new Date(ate+'T00:00:00');d<=fim;d.setDate(d.getDate()+1)){
      daily.push({key:fD(d),leads:0,vendas:0,receita:0});
    }
    const idx={};
    daily.forEach((x,i)=>idx[x.key]=i);
    dados.forEach(r=>{
      const dl=r[CI.dtLead];
      if(dl&&idx[dl]!==undefined) daily[idx[dl]].leads++;
      const dv=r[CI.dtVenda];
      if(dv&&idx[dv]!==undefined){daily[idx[dv]].vendas++;daily[idx[dv]].receita+=vRec(r);}
    });
  }

  return {vols,tPerd,tR,conv,vendedores,motivos,daily};
}

/* ===== Orquestrador ===== */
function comparar(){
  if(!DRAW) return;
  const pa={de:document.getElementById('pa-de').value, ate:document.getElementById('pa-ate').value};
  const pb={de:document.getElementById('pb-de').value, ate:document.getElementById('pb-ate').value};
  if(!pa.de||!pa.ate||!pb.de||!pb.ate) return;

  const cA=computarPeriodo(DRAW,pa.de,pa.ate);
  const cB=computarPeriodo(DRAW,pb.de,pb.ate);
  _cacheA=cA;_cacheB=cB;

  document.getElementById('conteudo').innerHTML=buildHTML(cA,cB,pa,pb);
  renderEvolucao(cA,cB);
  renderRanking(cA,cB);
  renderMotivos(cA,cB);
  setFooter(pa,pb);
}

/* Δ relativo: positivo = A melhor que B (a menos que higherIsBetter=false) */
function deltaInfo(a,b,higherIsBetter=true){
  let pct;
  if(b>0) pct=(a-b)/b*100;
  else pct=a>0?100:0;
  const up=higherIsBetter?pct>=0:pct<=0;
  return {pct,up};
}

function KFCMP(lb,cor,fmtFn,a,b){
  const {pct,up}=deltaInfo(a,b);
  const arrow=pct>=0?'↑':'↓';
  return `<div class="kf kf-cmp"><div class="kf-bar" style="background:${cor}"></div>
    <div class="kf-lbl">${lb}</div>
    <div class="kf-row a"><span class="kf-tag">A</span><span class="kf-val">${fmtFn(a)}</span></div>
    <div class="kf-row b"><span class="kf-tag">B</span><span class="kf-val">${fmtFn(b)}</span></div>
    <div class="kf-d ${up?'up':'dn'}">${arrow} ${Math.abs(pct).toFixed(1)}% vs Período B</div>
  </div>`;
}

function FECMP(lbl,cor,a,b,baseA,baseB,isPerda,extraStyle){
  const pctA=baseA>0?Math.round(a/baseA*100):0;
  const pctB=baseB>0?Math.round(b/baseB*100):0;
  const {pct,up}=deltaInfo(a,b,!isPerda);
  const arrow=pct>=0?'↑':'↓';
  const cls=isPerda?'fe-perda fe-cmp':'fe fe-cmp';
  return `<div class="${cls}"${extraStyle?` style="${extraStyle}"`:''}>
    <div class="fe-lbl">${lbl}</div>
    <div class="fe-val" style="color:${isPerda?'var(--red)':cor}">${fmt(a)}</div>
    <div class="fe-pct-total">${pctA}% do total · B: ${fmt(b)} (${pctB}%)</div>
    <div class="fe-bar-a"><div class="fe-bar-fill" style="width:${pctA}%;background:${cor}"></div></div>
    <div class="fe-bar-b"><div class="fe-bar-fill" style="width:${pctB}%;background:${cor};opacity:.4"></div></div>
    <div class="fe-delta ${up?'up':'dn'}">${arrow} ${Math.abs(pct).toFixed(0)}% vs Período B</div>
  </div>`;
}

function buildHTML(cA,cB,pa,pb){
  const kfi=`<div class="kfi">
    ${KFCMP('Receita total','var(--purple)',fmtR,cA.tR,cB.tR)}
    ${KFCMP('Vendas','var(--green)',fmt,cA.vols[4],cB.vols[4])}
    ${KFCMP('Leads','var(--blue)',fmt,cA.vols[0],cB.vols[0])}
    ${KFCMP('Conversão','var(--amber)',v=>v.toFixed(1)+'%',cA.conv,cB.conv)}
  </div>`;

  const baseA=cA.vols[0]||1, baseB=cB.vols[0]||1;
  let funilParts='';
  ETAPAS.forEach((e,i)=>{
    funilParts+=FECMP(e.lbl,e.cor,cA.vols[i],cB.vols[i],baseA,baseB,false,i===0?'border-radius:var(--r2) 0 0 var(--r2)':'');
  });
  funilParts+=FECMP('Perdas','var(--red)',cA.tPerd,cB.tPerd,baseA,baseB,true,'');

  const funil=`<div class="funil-wrap">
    <div class="funil-label">Funil comparativo — Período A vs Período B</div>
    <div class="funil-row">${funilParts}</div>
  </div>`;

  const nDias=Math.max(cA.daily.length,cB.daily.length);

  return kfi+funil+`
  <div class="row r2">
    <div class="card" style="animation-delay:.1s">
      <div class="ct">Evolução diária — A vs B</div>
      <div class="cs">Dia 1 a Dia ${nDias} de cada período</div>
      <div class="toggle-grp" style="margin-bottom:10px">
        <button class="tgl ${_evoMetric==='leads'?'on':''}"   data-m="leads"   onclick="setEvoMetric('leads')">Leads</button>
        <button class="tgl ${_evoMetric==='vendas'?'on':''}"  data-m="vendas"  onclick="setEvoMetric('vendas')">Vendas</button>
        <button class="tgl ${_evoMetric==='receita'?'on':''}" data-m="receita" onclick="setEvoMetric('receita')">Receita</button>
      </div>
      <div class="evo-legend">
        <span class="evo-leg-item"><span class="evo-leg-line"></span>Período A (${fBR(pa.de)} – ${fBR(pa.ate)})</span>
        <span class="evo-leg-item"><span class="evo-leg-line b"></span>Período B (${fBR(pb.de)} – ${fBR(pb.ate)})</span>
      </div>
      <canvas id="c-evo" height="220"></canvas>
    </div>
    <div class="card" style="animation-delay:.14s">
      <div class="ct">Motivos de perda</div>
      <div class="cs">Top 8 — Período A vs Período B</div>
      <div class="dual-bar" id="motivos-cmp"></div>
    </div>
  </div>
  <div class="row">
    <div class="card" style="animation-delay:.18s">
      <div class="ct">Ranking de vendedores</div>
      <div class="cs">Comparação por vendas, receita e conversão (ordenado por Vendas A)</div>
      <div style="overflow-x:auto"><table class="cmp-table" id="ranking-cmp"></table></div>
    </div>
  </div>`;
}

/* ===== Evolução diária ===== */
function setEvoMetric(m){
  _evoMetric=m;
  document.querySelectorAll('.tgl').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  if(_cacheA&&_cacheB) renderEvolucao(_cacheA,_cacheB);
}

Chart.defaults.color='#55576e';
Chart.defaults.font={family:"'Plus Jakarta Sans',sans-serif",size:11,weight:'500'};

function renderEvolucao(cA,cB){
  const el=document.getElementById('c-evo');
  if(!el) return;
  if(_chartEvo){_chartEvo.destroy();_chartEvo=null;}
  const n=Math.max(cA.daily.length,cB.daily.length);
  const labels=Array.from({length:n},(_,i)=>'Dia '+(i+1));
  const dataA=cA.daily.map(d=>d[_evoMetric]);
  const dataB=cB.daily.map(d=>d[_evoMetric]);
  const isR=_evoMetric==='receita';
  _chartEvo=new Chart(el,{
    type:'line',
    data:{labels,datasets:[
      {label:'Período A',data:dataA,borderColor:'#4f7aff',backgroundColor:'rgba(79,122,255,.08)',fill:true,tension:.3,pointRadius:0,borderWidth:2},
      {label:'Período B',data:dataB,borderColor:'rgba(255,255,255,.35)',borderDash:[5,4],backgroundColor:'transparent',fill:false,tension:.3,pointRadius:0,borderWidth:2},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1c1d2a',borderColor:'rgba(255,255,255,.13)',borderWidth:1,
          titleColor:'#ecedf5',bodyColor:'#8a8da8',padding:10,
          callbacks:{label:c=>` ${c.dataset.label}: ${isR?fmtR(c.parsed.y):fmt(c.parsed.y)}`}
        }
      },
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#55576e',maxRotation:0,autoSkip:true,maxTicksLimit:10}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#55576e',callback:v=>isR?'R$'+fK(v):fmt(v)}},
      }
    }
  });
}

/* ===== Ranking de vendedores ===== */
function renderRanking(cA,cB){
  const w=document.getElementById('ranking-cmp');
  if(!w) return;
  const mapA={},mapB={};
  cA.vendedores.forEach(v=>mapA[v.vendedor]=v);
  cB.vendedores.forEach(v=>mapB[v.vendedor]=v);
  const nomes=new Set([...Object.keys(mapA),...Object.keys(mapB)]);
  const vazio={leads:0,vendas:0,receita:0,conversao:0};

  const rows=[...nomes].map(nome=>({nome,a:mapA[nome]||vazio,b:mapB[nome]||vazio}))
    .sort((x,y)=>y.a.vendas-x.a.vendas);

  const dCell=(a,b,fmtFn)=>{
    const d=a-b, cls=d>=0?'pos':'neg', sign=d>=0?'+':'-';
    return `<td class="${cls}">${sign}${fmtFn(Math.abs(d))}</td>`;
  };

  if(!rows.length){w.innerHTML='<thead></thead><tbody><tr><td style="color:var(--mu)">Nenhum vendedor no período</td></tr></tbody>';return;}

  let html='<thead><tr><th>Vendedor</th><th>Vendas A</th><th>Vendas B</th><th>Δ Vendas</th><th>Receita A</th><th>Receita B</th><th>Δ Receita</th><th>Conv. A</th><th>Conv. B</th></tr></thead><tbody>';
  rows.forEach(r=>{
    html+=`<tr>
      <td>${r.nome}</td>
      <td>${fmt(r.a.vendas)}</td>
      <td>${fmt(r.b.vendas)}</td>
      ${dCell(r.a.vendas,r.b.vendas,fmt)}
      <td>${fmtR(r.a.receita)}</td>
      <td>${fmtR(r.b.receita)}</td>
      ${dCell(r.a.receita,r.b.receita,fmtR)}
      <td>${r.a.conversao.toFixed(1)}%</td>
      <td>${r.b.conversao.toFixed(1)}%</td>
    </tr>`;
  });
  html+='</tbody>';
  w.innerHTML=html;
}

/* ===== Motivos de perda ===== */
function renderMotivos(cA,cB){
  const w=document.getElementById('motivos-cmp');
  if(!w) return;
  const motivos=new Set([...Object.keys(cA.motivos),...Object.keys(cB.motivos)]);
  const rows=[...motivos].map(m=>({motivo:m,a:cA.motivos[m]||0,b:cB.motivos[m]||0}))
    .sort((x,y)=>(y.a+y.b)-(x.a+x.b)).slice(0,8);

  if(!rows.length){w.innerHTML='<p style="color:var(--mu);font-size:12px;padding:8px 0">Nenhuma perda no período</p>';return;}

  const max=Math.max(...rows.map(r=>Math.max(r.a,r.b)),1);
  w.innerHTML=rows.map(r=>`<div class="db-row">
    <div class="db-lbl">${r.motivo}</div>
    <div class="db-line"><span class="db-tag">A</span><div class="db-bw"><div class="db-fill a" style="width:${Math.round(r.a/max*100)}%"></div></div><span class="db-n">${fmt(r.a)}</span></div>
    <div class="db-line"><span class="db-tag">B</span><div class="db-bw"><div class="db-fill b" style="width:${Math.round(r.b/max*100)}%"></div></div><span class="db-n">${fmt(r.b)}</span></div>
  </div>`).join('');
}

function setFooter(pa,pb){
  document.getElementById('footer').textContent=
    `Período A: ${fBR(pa.de)} a ${fBR(pa.ate)}  ·  Período B: ${fBR(pb.de)} a ${fBR(pb.ate)}  ·  comparação gerada em ${new Date().toLocaleString('pt-BR')}`;
}

window.addEventListener('load',carregar);
</script>
